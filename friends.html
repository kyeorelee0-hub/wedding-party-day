<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파티 참석한 친구들</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('photo-friends.jpg') center/cover no-repeat;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10, 6, 3, 0.55);
    }

    .scroll-wrap {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
    }

    .page {
      min-height: 100%;
      padding: 0 0 80px;
      color: #fff;
    }

    /* 헤더 */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      background: rgba(10, 6, 3, 0.4);
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }

    .back-btn {
      text-decoration: none;
      color: rgba(255,255,255,0.6);
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      line-height: 1;
      transition: color 0.2s;
    }
    .back-btn:hover { color: #fff; }

    .top-bar-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
    }

    .top-bar-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 3px;
      color: #d4b896;
      margin-left: auto;
    }

    /* 컨텐츠 */
    .content {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .section-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #d4b896;
      margin-bottom: 8px;
    }

    .section-heading {
      font-family: 'Noto Serif KR', serif;
      font-size: 20px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 8px;
    }

    .section-desc {
      font-family: 'Noto Serif KR', serif;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 36px;
    }

    /* 카드 그리드 */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    .friend-card {
      aspect-ratio: 3 / 4;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 2px;
      background: rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      text-align: center;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .friend-card:hover { background: rgba(255,255,255,0.13); border-color: rgba(212,184,150,0.3); }
    .friend-card:active { transform: scale(0.97); }

    .card-icon {
      font-size: 28px;
      margin-bottom: 14px;
      line-height: 1;
    }

    .card-keyword {
      font-family: 'Noto Serif KR', serif;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .card-hint {
      font-family: 'Noto Serif KR', serif;
      font-size: 10px;
      color: rgba(255,255,255,0.3);
    }

    .cards-msg {
      text-align: center;
      padding: 60px 0;
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      grid-column: 1 / -1;
    }

    @media (max-width: 480px) {
      .cards-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    }

    /* 모달 */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(10, 6, 3, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-box {
      background: rgba(22, 14, 8, 0.96);
      border: 1px solid rgba(212,184,150,0.28);
      border-radius: 2px;
      padding: 36px 28px 28px;
      max-width: 360px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      transform: translateY(14px);
      transition: transform 0.22s;
      text-align: center;
    }
    .modal-backdrop.open .modal-box { transform: translateY(0); }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s;
    }
    .modal-close:hover { color: rgba(255,255,255,0.7); }

    .modal-icon { font-size: 40px; margin-bottom: 12px; line-height: 1; }
    .modal-keyword {
      font-family: 'Noto Serif KR', serif;
      font-size: 12px;
      font-weight: 500;
      color: #d4b896;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
    .modal-divider {
      width: 32px;
      height: 1px;
      background: rgba(212,184,150,0.3);
      margin: 0 auto 20px;
    }
    .modal-story {
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      line-height: 2;
      color: rgba(255,255,255,0.78);
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="scroll-wrap">
    <div class="page">
      <div class="top-bar">
        <a class="back-btn" href="index.html">←</a>
        <span class="top-bar-title">파티 참석한 친구들</span>
        <span class="top-bar-sub">Our People</span>
      </div>

      <div class="content">
        <p class="section-label">Our People</p>
        <h2 class="section-heading">오늘 함께한 사람들</h2>
        <p class="section-desc">키워드와 이모지는 클로드가 알아서 해준거에요.</p>
        <div class="cards-grid" id="cardsGrid">
          <p class="cards-msg">불러오는 중...</p>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal" onclick="closeModal(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-icon" id="modalIcon"></div>
      <div class="modal-keyword" id="modalKeyword"></div>
      <div class="modal-divider"></div>
      <div class="modal-story" id="modalStory"></div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6OwpvXgDKs3ZVZJN0KMiZgaF0lA4bQOYBSy93bYapBMD0zE1vr2_uhFuWci4MERD88w/exec';
    const FALLBACK_ICONS = [
      '⚖️','🎭','📚','🌸','🌟','🍀','⚾','🍽️','🎨','🔮',
      '🤝','💃','🌿','🌈','✍️','🍃','💼','🍖','🩰','🎬',
      '🍻','🍳','🏔️','🐯','⭐','🏆','🌊','🍲','💝','🌙',
      '⛵','💍','🎯','👀','🧘','🚀','🌸','⚖️','🌟','🔄',
      '🦁','💛','🌻','⚾','🧩','🎵','🏥','💑','🌈','✨'
    ];

    function getCardMeta(story) {
      const s = story || '';
      if (s.includes('민법 왕') || s.includes('오도사'))              return { keyword: '민법 왕',       icon: '⚖️' };
      if (s.includes('시아준수') || s.includes('썰바구니'))           return { keyword: '준수 진성팬',    icon: '🎭' };
      if (s.includes('혼자 연구하는거 좋아'))                         return { keyword: '만물박사',       icon: '📚' };
      if (s.includes('내향인이지만 끼많고'))                          return { keyword: '숨은 애교왕',    icon: '🌸' };
      if (s.includes('중학교 선배') && s.includes('존경하는 친구'))   return { keyword: '평생 롤모델',    icon: '🌟' };
      if (s.includes('윤진이와 부부'))                                 return { keyword: '윤진짝궁',       icon: '🍀' };
      if (s.includes('세금환급') || s.includes('행적적인거'))         return { keyword: '기아 세금박사',  icon: '⚾' };
      if (s.includes('지연성검사도 0') || s.includes('알러지도 음식물')) return { keyword: '알러지 제로', icon: '🍽️' };
      if (s.includes('윤진부부는 함께 취미부자'))                     return { keyword: '취미 부자',      icon: '🎨' };
      if (s.includes('타로/사주') || s.includes('에너제틱한 예랑'))   return { keyword: '타로 마스터',    icon: '🔮' };
      if (s.includes('1학년때부터') && s.includes('와이프분이랑'))    return { keyword: '입학부터 찐친',  icon: '🤝' };
      if (s.includes('팝핀에서 친구 하나도 없을 때'))                 return { keyword: '하리 팝핀',      icon: '💃' };
      if (s.includes('깊은 생각과 섬세한 마음씀'))                    return { keyword: '섬세한 감성',    icon: '🌿' };
      if (s.includes('토스로 이직함'))                                 return { keyword: '인생 반전러',    icon: '🌈' };
      if (s.includes('섬세하고 센스있는 언어능력'))                   return { keyword: '', icon: '', hidden: true };
      if (s.includes('전주 출신') || s.includes('철학과 졸업') || s.includes('로스쿨 7기') || s.includes('술버릇이 착한')) return { keyword: '철학도 로스쿨러', icon: '🍃' };
      if (s.includes('토스 최고미남') || s.includes('농구선수였던 선출'))  return { keyword: '팔방미인 의리남', icon: '🏀' };
      if (s.includes('주짓수') || s.includes('지금은 사업가, 대표님')) return { keyword: '조용한 대표님', icon: '💼' };
      if (s.includes('먹성이 좋아서'))                                 return { keyword: '먹성 선배',      icon: '🍖' };
      if (s.includes('취미로 발레를 함'))                              return { keyword: '토스 4년 동기',  icon: '🩰' };
      if (s.includes('영화쪽에서 일하는'))                             return { keyword: '영화계 인재',    icon: '🎬' };
      if (s.includes('형사정책 수업에서 만나'))                        return { keyword: '로스쿨 술친구',  icon: '🍻' };
      if (s.includes('쏘세지야채볶음') || s.includes('선민이 남편'))  return { keyword: '명절 요리왕',    icon: '🍳' };
      if (s.includes('백두산도 올라가봄'))                             return { keyword: '백두산 동반',    icon: '🏔️' };
      if (s.includes('동갑이어서 더 친해짐') && s.includes('기아'))   return { keyword: '기아 동갑',      icon: '🐯' };
      if (s.includes('덕질을 위해 돈을 번다'))                        return { keyword: '덕질로 번 돈',   icon: '⭐' };
      if (s.includes('상산고에서 공부잘하기로'))                       return { keyword: '상산고 전설',    icon: '🏆' };
      if (s.includes('바쁘다 바빠 인간'))                              return { keyword: '안 쉬는 사람',   icon: '🌊' };
      if (s.includes('국밥충이라 국밥 정보'))                          return { keyword: '국밥 정보통',    icon: '🍲' };
      if (s.includes('특수교사') || s.includes('나의 모든 역사를 아는') || s.includes('어느 순간에도 내 편')) return { keyword: '', icon: '', hidden: true };
      if (s.includes('어둠의 비밀조직 카톡방'))                        return { keyword: '비밀 조직원',    icon: '🌙' };
      if (s.includes('태종대에서 만난'))                               return { keyword: '태종대 인연',    icon: '⛵' };
      if (s.includes('결혼스토리가 제일 재미있음'))                    return { keyword: '결혼 스토리',    icon: '💍' };
      if (s.includes('다트를 매우매우 잘한다'))                        return { keyword: '다트 고수',      icon: '🎯' };
      if (s.includes('여자보는 눈이 비슷함'))                          return { keyword: '여자 보는 눈',   icon: '👀' };
      if (s.includes('코어하우스') || s.includes('최고의 필라테스'))  return { keyword: '인생 필라테스',  icon: '🧘' };
      if (s.includes('같은 날 퇴사하면서'))                            return { keyword: '같은날 퇴사',    icon: '🚀' };
      if (s.includes('귀여운 막내 재질') || s.includes('20살 때 보았는데')) return { keyword: '귀여운 막내', icon: '🌸' };
      if (s.includes('변호사로 변신해서 나타난'))                      return { keyword: '변호사 변신',    icon: '⚖️' };
      if (s.includes('내 성격 중 일부를 만들었다고 생각함'))          return { keyword: '인생 선배',      icon: '🌟' };
      if (s.includes('송화핑') || s.includes('직무 전환에 너무 큰 힘')) return { keyword: '180도 돌변',  icon: '🔄' };
      if (s.includes('야구볼 땐 야수가 됨'))                           return { keyword: '야구볼 때 야수', icon: '🦁' };
      if (s.includes('선함이 뚝뚝 묻어나는'))                         return { keyword: '선함이 뚝뚝',    icon: '💛' };
      if (s.includes('지예님') || s.includes('수용성 높은 친구'))     return { keyword: '베이스가 선한',  icon: '🌻' };
      if (s.includes('한화팬이었음'))                                  return { keyword: '한화팬의 용기',  icon: '⚾' };
      if (s.includes('동현님') || s.includes('방탈출 진짜 많이'))     return { keyword: '방탈출 단짝',    icon: '🧩' };
      if (s.includes('초등학교 6학년때 전학') || s.includes('노래도 춤도 다 잘추고')) return { keyword: '끼 넘치는 친구', icon: '🎵' };
      if (s.includes('간호사가 된 후에') || s.includes('중학교 때 영어학원')) return { keyword: '매력 넘치는 친구', icon: '🏥' };
      if (s.includes('이 부부는 함께 취미부자') || (s.includes('상준과 커플') && !s.includes('윤진부부'))) return { keyword: '찰떡 케미', icon: '💑' };
      if (s.includes('심심한 친구인줄 알았는데') || s.includes('자신의 길을 개척하는데에 진심')) return { keyword: '마음이 부자', icon: '🌈' };
      return { keyword: '', icon: '' };
    }

    let cardsCache = [];

    function openModal(i) {
      const c = cardsCache[i];
      document.getElementById('modalIcon').textContent = c.icon;
      document.getElementById('modalKeyword').textContent = c.keyword;
      document.getElementById('modalStory').textContent = c.story;
      document.getElementById('modal').classList.add('open');
    }

    function closeModal(e) {
      if (e && e.target !== document.getElementById('modal') && e.type !== 'undefined') {
        if (e.target.closest('.modal-box')) return;
      }
      document.getElementById('modal').classList.remove('open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    async function loadCards() {
      const grid = document.getElementById('cardsGrid');
      try {
        const res = await fetch(SCRIPT_URL + '?action=cards');
        const data = await res.json();
        if (!data.cards || data.cards.length === 0) {
          grid.innerHTML = '<p class="cards-msg">카드가 아직 준비 중이에요</p>';
          return;
        }
        cardsCache = data.cards
          .filter(card => !getCardMeta(card.story).hidden)
          .map((card, i) => {
            const meta = getCardMeta(card.story);
            return {
              icon: meta.icon || FALLBACK_ICONS[i % FALLBACK_ICONS.length],
              keyword: meta.keyword || '',
              story: card.story,
            };
          });
        for (let i = cardsCache.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [cardsCache[i], cardsCache[j]] = [cardsCache[j], cardsCache[i]];
        }
        grid.innerHTML = cardsCache.map((c, i) => `
          <div class="friend-card" onclick="openModal(${i})">
            <div class="card-icon">${c.icon}</div>
            ${c.keyword ? `<div class="card-keyword">${c.keyword}</div>` : ''}
            <div class="card-hint">눌러서 보기</div>
          </div>
        `).join('');
      } catch (e) {
        grid.innerHTML = '<p class="cards-msg">불러오지 못했어요</p>';
      }
    }

    loadCards();
  </script>
</body>
</html>
