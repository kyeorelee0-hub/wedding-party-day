<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유인상 ♥ 이겨레 청첩파티</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('photo-main.jpg') center/cover no-repeat;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10, 6, 3, 0.42);
    }

    .scroll-wrap {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
    }

    .page {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 80px;
      color: #fff;
      text-align: center;
    }

    .hero-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #d4b896;
      margin-bottom: 20px;
    }

    .hero-names {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .hero-heart { color: #d4b896; margin: 0 10px; }

    .hero-date {
      font-family: 'Noto Serif KR', serif;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 64px;
    }

    /* 주의사항 */
    .notices {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 340px;
      width: 100%;
      margin-bottom: 64px;
    }

    .notice-item {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 2px;
      padding: 18px 22px;
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      line-height: 1.8;
      color: rgba(255,255,255,0.88);
      text-align: left;
    }

    .notice-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: #d4b896;
      display: block;
      margin-bottom: 6px;
    }

    /* 네비게이션 카드 */
    .nav-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 340px;
      width: 100%;
    }

    .nav-card {
      display: block;
      text-decoration: none;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 2px;
      padding: 22px 24px;
      text-align: left;
      transition: background 0.2s;
    }

    .nav-card:hover { background: rgba(255,255,255,0.18); }

    .nav-card-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #d4b896;
      display: block;
      margin-bottom: 6px;
    }

    .nav-card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
    }

    .nav-card-arrow {
      float: right;
      color: rgba(255,255,255,0.4);
      font-size: 16px;
      margin-top: 2px;
    }

    @media (max-width: 420px) {
      .hero-names { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="scroll-wrap">
    <div class="page">
      <p class="hero-label">Wedding Party</p>
      <h1 class="hero-names">유인상 <span class="hero-heart">♥</span> 이겨레</h1>
      <p class="hero-date">2026 · 07 · 10 · 역삼 샹볼뮈지니</p>

      <div class="notices">
        <div class="notice-item">
          <span class="notice-num">01</span>
          주의사항 첫 번째를 여기에 써줘
        </div>
        <div class="notice-item">
          <span class="notice-num">02</span>
          주의사항 두 번째를 여기에 써줘
        </div>
      </div>

      <div class="nav-cards">
        <a class="nav-card" href="qa.html">
          <span class="nav-card-label">About Us</span>
          <span class="nav-card-title">인상 &amp; 겨레 알아보기</span>
          <span class="nav-card-arrow">→</span>
        </a>
        <a class="nav-card" href="friends.html">
          <span class="nav-card-label">Our People</span>
          <span class="nav-card-title">파티 참석한 친구들 알아보기</span>
          <span class="nav-card-arrow">→</span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
