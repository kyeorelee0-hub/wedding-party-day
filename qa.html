<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인상 & 겨레 알아보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('photo-qa.jpg') center/cover no-repeat;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10, 6, 3, 0.55);
    }

    .scroll-wrap {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
    }

    .page {
      min-height: 100%;
      padding: 0 0 80px;
      color: #fff;
    }

    /* 헤더 */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      background: rgba(10, 6, 3, 0.4);
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }

    .back-btn {
      text-decoration: none;
      color: rgba(255,255,255,0.6);
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      line-height: 1;
      transition: color 0.2s;
    }
    .back-btn:hover { color: #fff; }

    .top-bar-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
    }

    .top-bar-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 3px;
      color: #d4b896;
      margin-left: auto;
    }

    /* 컨텐츠 */
    .content {
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .section-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #d4b896;
      margin-bottom: 8px;
    }

    .section-heading {
      font-family: 'Noto Serif KR', serif;
      font-size: 20px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 40px;
    }

    /* Q&A 아코디언 */
    .qa-list { display: flex; flex-direction: column; }

    .qa-item {
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .qa-item:first-child { border-top: 1px solid rgba(255,255,255,0.12); }

    .qa-btn {
      width: 100%;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 22px 0;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      color: #fff;
    }

    .qa-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      color: #d4b896;
      flex-shrink: 0;
      padding-top: 1px;
      width: 22px;
    }

    .qa-q {
      font-family: 'Noto Serif KR', serif;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      flex: 1;
      line-height: 1.6;
    }

    .qa-arrow {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      flex-shrink: 0;
      margin-top: 2px;
      transition: transform 0.3s;
    }

    .qa-item.open .qa-arrow { transform: rotate(180deg); }

    .qa-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }

    .qa-item.open .qa-answer { max-height: 500px; }

    .qa-answer-inner {
      padding: 0 0 24px 36px;
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      line-height: 2;
      color: rgba(255,255,255,0.65);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="scroll-wrap">
    <div class="page">
      <div class="top-bar">
        <a class="back-btn" href="index.html">←</a>
        <span class="top-bar-title">인상 &amp; 겨레 알아보기</span>
        <span class="top-bar-sub">About Us</span>
      </div>

      <div class="content">
        <p class="section-label">Q & A</p>
        <h2 class="section-heading">두 사람 이야기</h2>

        <div class="qa-list" id="qaList"></div>
      </div>
    </div>
  </div>

  <script>
    const QA_DATA = [
      { q: '언제 처음 만났나요?', a: '' },
      { q: '그때부터 계속 사귄건가요?', a: '' },
      { q: '프로포즈는 했나요?', a: '' },
      { q: '신혼여행은 어디?', a: '' },
      { q: '신혼집은 어딘가요?', a: '' },
      { q: '왜 결혼을 결심했나요? — 겨레 편', a: '' },
      { q: '왜 결혼을 결심했나요? — 인상 편', a: '' },
      { q: '왜이렇게 빨리 결혼해요?', a: '' },
    ];

    const list = document.getElementById('qaList');
    list.innerHTML = QA_DATA.map((item, i) => `
      <div class="qa-item">
        <button class="qa-btn" onclick="toggle(this)">
          <span class="qa-num">${String(i+1).padStart(2,'0')}</span>
          <span class="qa-q">${item.q}</span>
          <span class="qa-arrow">▾</span>
        </button>
        <div class="qa-answer">
          <div class="qa-answer-inner">${item.a || '답변 준비 중이에요 :)'}</div>
        </div>
      </div>
    `).join('');

    function toggle(btn) {
      const item = btn.closest('.qa-item');
      const isOpen = item.classList.contains('open');
      document.querySelectorAll('.qa-item.open').forEach(el => el.classList.remove('open'));
      if (!isOpen) item.classList.add('open');
    }
  </script>
</body>
</html>
