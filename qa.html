<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인상 & 겨레 알아보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }

    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 6, 3, 0.58);
      z-index: 1;
    }

    .scroll-wrap {
      position: fixed;
      inset: 0;
      z-index: 2;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
    }

    .page {
      min-height: 100%;
      padding: 0 0 80px;
      color: #fff;
    }

    /* 헤더 */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      background: rgba(10, 6, 3, 0.45);
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }

    .back-btn {
      text-decoration: none;
      color: rgba(255,255,255,0.6);
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      line-height: 1;
      transition: color 0.2s;
    }
    .back-btn:hover { color: #fff; }

    .top-bar-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
    }

    .top-bar-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 3px;
      color: #d4b896;
      margin-left: auto;
    }

    /* 컨텐츠 */
    .content {
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .section-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #d4b896;
      margin-bottom: 8px;
    }

    .section-heading {
      font-family: 'Noto Serif KR', serif;
      font-size: 20px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 8px;
    }

    .section-desc {
      font-family: 'Noto Serif KR', serif;
      font-size: 12px;
      color: rgba(255,255,255,0.40);
      margin-bottom: 40px;
    }

    /* Q&A 아코디언 */
    .qa-list { display: flex; flex-direction: column; }

    .qa-item {
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .qa-item:first-child { border-top: 1px solid rgba(255,255,255,0.12); }

    .qa-btn {
      width: 100%;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 22px 0;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      color: #fff;
    }

    .qa-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      color: #d4b896;
      flex-shrink: 0;
      padding-top: 1px;
      width: 22px;
    }

    .qa-q {
      font-family: 'Noto Serif KR', serif;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      flex: 1;
      line-height: 1.6;
    }

    .qa-arrow {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      flex-shrink: 0;
      margin-top: 2px;
      transition: transform 0.3s;
    }

    .qa-item.open .qa-arrow { transform: rotate(180deg); }

    .qa-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s ease;
    }

    .qa-item.open .qa-answer { max-height: 1200px; }

    .qa-answer-inner {
      padding: 0 0 24px 36px;
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      line-height: 2.1;
      color: rgba(255,255,255,0.65);
    }

    .qa-answer-inner p + p { margin-top: 14px; }

    .speaker-row { padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.08); }
    .speaker-row:first-child { padding-top: 0; border-top: none; }
    .speaker-tag { display: block; font-family: 'Cormorant Garamond', serif; font-size: 11px; letter-spacing: 2px; color: #d4b896; margin-bottom: 8px; }

    /* 라이브 질문 섹션 */
    .live-qa {
      margin-top: 56px;
      padding-top: 48px;
      border-top: 1px solid rgba(255,255,255,0.10);
    }

    .q-form { display: flex; flex-direction: column; gap: 10px; margin: 28px 0 32px; }

    .q-input, .q-textarea {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 2px;
      color: #fff;
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      padding: 12px 14px;
      outline: none;
      resize: none;
      transition: border-color 0.2s;
    }
    .q-input::placeholder, .q-textarea::placeholder { color: rgba(255,255,255,0.3); }
    .q-input:focus, .q-textarea:focus { border-color: rgba(212,184,150,0.5); }
    .q-input { max-width: 180px; }

    .q-btn {
      align-self: flex-start;
      background: rgba(212,184,150,0.12);
      border: 1px solid rgba(212,184,150,0.35);
      border-radius: 2px;
      color: #d4b896;
      cursor: pointer;
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      padding: 10px 24px;
      transition: background 0.2s;
    }
    .q-btn:hover { background: rgba(212,184,150,0.22); }
    .q-btn:disabled { opacity: 0.45; cursor: default; }

    .q-status { font-family: 'Noto Serif KR', serif; font-size: 12px; color: rgba(255,255,255,0.45); min-height: 18px; }

    .q-item {
      padding: 16px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .q-item:first-child { border-top: 1px solid rgba(255,255,255,0.08); }
    .q-item-name { font-family: 'Cormorant Garamond', serif; font-size: 11px; letter-spacing: 2px; color: #d4b896; margin-bottom: 6px; }
    .q-item-text { font-family: 'Noto Serif KR', serif; font-size: 13px; line-height: 1.9; color: rgba(255,255,255,0.75); }
    .q-empty { font-family: 'Noto Serif KR', serif; font-size: 12px; color: rgba(255,255,255,0.3); padding: 16px 0; }
  </style>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="qa-bg.mp4" type="video/mp4">
  </video>
  <div class="bg-overlay"></div>

  <div class="scroll-wrap">
    <div class="page">
      <div class="top-bar">
        <a class="back-btn" href="index.html">←</a>
        <span class="top-bar-title">인상 &amp; 겨레 Q&amp;A</span>
        <span class="top-bar-sub">About Us</span>
      </div>

      <div class="content">
        <p class="section-label">Q & A</p>
        <h2 class="section-heading">두 사람 이야기</h2>
        <div class="qa-list" id="qaList"></div>

        <div class="live-qa">
          <p class="section-label">Live Q &amp; A</p>
          <h2 class="section-heading">궁금한 게 있나요?</h2>
          <p class="section-desc">실명으로 질문해주시면 저희가 찾아가 직접 답변드릴게요!</p>
          <div class="q-form">
            <input class="q-input" id="qName" type="text" placeholder="이름" maxlength="20">
            <textarea class="q-textarea" id="qText" placeholder="질문을 입력해주세요" rows="3" maxlength="300"></textarea>
            <button class="q-btn" onclick="submitLiveQ()">질문하기</button>
            <p class="q-status" id="qStatus"></p>
          </div>
          <div id="qList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const QA_DATA = [
      {
        q: '언제 처음 만났나요?',
        a: `<p>처음 인사를 나눈 건 2009년 여름방학, 연대 중앙 춤동아리 '하리'에서였어요. 그때 신입생 팝핀팀에 여성분이 한 분 계셨는데, 그분이 바로 겨레였죠. 함께 연고전 공연을 준비하면서 친해졌어요.</p><p>그런데 사실 진짜 처음 본 건 그 해 1학기 교양수업이었던 '사진예술의 이해'라는 강의에서였어요. 중간고사 대체 발표를 하던 어떤 여성분이 너무 멋있고 딱 제 스타일이라 번호를 물어볼까 했는데, 망설이다가 결국 물어보지 못했거든요. 그런데 그분을 학기가 끝나고 들어간 춤 동아리에서 다시 만난 거예요. 심지어 같은 팀으로요.</p>`
      },
      {
        q: '그때부터 계속 사귄건가요?',
        a: `<div class="speaker-row"><span class="speaker-tag">👨 인상</span><p>그렇진 않아요. 2009년 2학기에 만나기 시작했는데, 제가 2010년 2월에 군대를 가게 되었거든요. 사실 몇 달 만나지 못하고 입대했고, 군대에서 일말상초쯤 헤어지게 되었어요. 제가 멘탈이 좀 좋지 않던 시기여서 많이 까칠해졌던 것 같아요.</p><p>그렇게 안 좋게 헤어지고, 다시 연락을 해본 건 전역 후 한 3년쯤 지나서였던 것 같아요. 이후로도 2~3년에 한 번씩 어쩌다 연락을 하고 가끔 얼굴을 볼 때도 있었지만, 다시 사귀지는 않았어요. 제가 박사 후 과정으로 2021년에 캐나다로 나갔는데, 나가기 전에도 한 번 보긴 했었죠. 그러다 정식으로 다시 만나게 된 건 작년 8월, 제가 캐나다에서 박사 후 과정을 끝내고 한국에 돌아올 무렵부터예요.</p></div><div class="speaker-row"><span class="speaker-tag">👩 겨레</span><p>아니 진짜 인상이가 그때는 정말 까칠했었는데, 저는 정말 다시 만날 마음이 없었거든요? 근데 이렇게 안까칠한 사람인지 몰랐어요. 정말 새롭다. 여전히 새로워요. 그때랑 같은 사람 맞나..? 아 물론 그때도 제일 재미있긴 했어요.</p></div>`
      },
      {
        q: '프로포즈는 했나요?',
        a: `<p>올해 발렌타인데이에 했어요. 결혼 얘기를 꺼내고 싶었고, 겨레가 나랑 하는 결혼에 대해서 어떻게 생각하는지 궁금했거든요. 그런데 결혼하자는 말을 하지 않고 그러한 이야기를 어떻게 꺼낼지 잘 모르겠더라고요. 그래서 물어보게 되었죠.</p><p>"난 너랑 결혼하고 싶은 마음인데, 넌 어떠냐고."</p>`
      },
      {
        q: '신혼여행은 어디로 가나요?',
        a: `<p>아직 정하지 않았어요. 제가 2학기 강의 준비로 여유가 없을 것 같아서 겨레에게 양해를 구하고 겨울에 가기로 했어요.</p><p>결혼식이 끝나고는 제주도에서 잠깐 쉬고, 겨울에는 유럽이나 따뜻한 동남아로 가지 않을까 싶어요. 아직 아무것도 정한 건 없습니다.</p>`
      },
      {
        q: '신혼집은 어딘가요?',
        a: `<p>지금 제가 대전에 살고 겨레는 서울에 살아서 따로 신혼집은 없습니다. 주말에 보고, 평일에도 제가 어느 정도 왔다 갔다 하면서 당분간 지낼 생각이에요. 그 이후 계획도 아직 정해진 건 없습니다.</p>`
      },
      {
        q: '왜 결혼을 결심했나요?',
        a: `<div class="speaker-row"><span class="speaker-tag">👨 인상</span><p>겨레는 상반된 매력을 많이 가진 사람이라고 생각해요. 따뜻하면서도 냉철하고, 고민이 깊으면서도 자신에게 제일 엄격하고, 꼬인 구석이 없으면서도 드립을 잘 치고, 술을 많이 마시면서도 운동을 열심히 해서 건강하고, 잘생겼으면서도 예쁘달까요.</p><p>외모로 입덕한 건 맞아요. 그런데 그것보다는… 이미 품이 많이 드는 방식으로 살아가고 있으면서도 정작 본인은 에너지를 더 채우고 발전해나가려고 하더라고요. 보면서, 아… 여기서 빠져나갈 수가 없겠다 싶었습니다.</p></div><div class="speaker-row"><span class="speaker-tag">👩 겨레</span><p>일단 결혼을 생각해보지 않았었는데, 결혼하자고 하니 마음에 걸리는 게 정말 없었어요. 진짜 혼자 있고 싶어하는 사람인 줄 알았는데, 이 친구랑 있으면 혼자 있는 것보다 항상 더 재밌고 심지어 편했어요. 재밌으면서 편할 수 있나..?</p><p>인상이는 제가 좋아하는 걸 다 모아서 사람으로 만든 것 같은… 목소리도 좋고, 덕후에다가, 차분하면서 웃기고, 내향인인데 저보다 낯은 더 안 가리고, 센스있는데 예민하지 않고 여유로운 사람이에요. 새로운 모습을 알아도 다 좋음. 미래를 그려도 재미있을 것 같다는 생각만 들었어요. 재미는 있는데 불안은 하나도 없는.?</p></div>`
      },
      {
        q: '왜이렇게 빨리 결혼해요?',
        a: `<div class="speaker-row"><span class="speaker-tag">👨 인상</span><p>겨레랑 빨리 결혼하고 싶어서 합니다.</p></div><div class="speaker-row"><span class="speaker-tag">👩 겨레</span><p>하기로 했으면 얼른 해야지! 시간 끌어서 무얼 하나!</p></div>`
      },
      {
        q: '둘이 싸워봤나요?',
        a: ''
      },
      {
        q: '결혼식 준비하면서 몰랐던 상대방 새로운 모습 발견한 게 있나요?',
        a: ''
      },
    ];

    const list = document.getElementById('qaList');
    list.innerHTML = QA_DATA.map((item, i) => `
      <div class="qa-item">
        <button class="qa-btn" onclick="toggle(this)">
          <span class="qa-num">${String(i+1).padStart(2,'0')}</span>
          <span class="qa-q">${item.q}</span>
          <span class="qa-arrow">▾</span>
        </button>
        <div class="qa-answer">
          <div class="qa-answer-inner">${item.a || '<p>답변 준비 중이에요 :)</p>'}</div>
        </div>
      </div>
    `).join('');

    function toggle(btn) {
      const item = btn.closest('.qa-item');
      const isOpen = item.classList.contains('open');
      document.querySelectorAll('.qa-item.open').forEach(el => el.classList.remove('open'));
      if (!isOpen) item.classList.add('open');
    }

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6OwpvXgDKs3ZVZJN0KMiZgaF0lA4bQOYBSy93bYapBMD0zE1vr2_uhFuWci4MERD88w/exec';

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function submitLiveQ() {
      const name = document.getElementById('qName').value.trim();
      const question = document.getElementById('qText').value.trim();
      const status = document.getElementById('qStatus');
      const btn = document.querySelector('.q-btn');
      if (!question) { status.textContent = '질문을 입력해주세요!'; return; }
      btn.disabled = true;
      status.textContent = '전송 중...';
      try {
        const params = new URLSearchParams({ action: 'submitQuestion', name: name || '익명', question });
        await fetch(SCRIPT_URL + '?' + params);
        status.textContent = '질문이 전달되었어요! 저희가 찾아갈게요 :)';
        document.getElementById('qName').value = '';
        document.getElementById('qText').value = '';
        setTimeout(loadLiveQ, 800);
      } catch(e) {
        status.textContent = '전송에 실패했어요. 다시 시도해주세요.';
      }
      btn.disabled = false;
    }

    async function loadLiveQ() {
      const list = document.getElementById('qList');
      try {
        const res = await fetch(SCRIPT_URL + '?action=questions');
        const data = await res.json();
        if (!data.questions || data.questions.length === 0) { list.innerHTML = ''; return; }
        const reversed = [...data.questions].reverse();
        list.innerHTML = reversed.map(q => `
          <div class="q-item">
            <div class="q-item-name">${esc(q.name)}</div>
            <div class="q-item-text">${esc(q.question)}</div>
          </div>
        `).join('');
      } catch(e) {}
    }

    loadLiveQ();
    setInterval(loadLiveQ, 30000);
  </script>
</body>
</html>
